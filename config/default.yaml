# Onboard default configuration
# Override with environment variables: ONBOARD_MODEL, ANTHROPIC_API_KEY

# AI model settings
model: "claude-sonnet-4-6"
max_tokens: 4096
temperature: 0.3

# Scanner settings
max_file_size: 100000  # bytes
ignored_dirs:
  - .git
  - node_modules
  - __pycache__
  - .venv
  - venv
  - dist
  - build
  - .tox
  - .mypy_cache
  - .pytest_cache
  - target
  - .next
  - .nuxt
  - coverage
  - .idea
  - .vscode

ignored_files:
  - ".DS_Store"
  - "Thumbs.db"
  - "*.pyc"
  - "*.pyo"
  - "*.class"
  - "*.o"
  - "*.so"
  - "*.dylib"

# Deep analysis
max_files_to_read: 50
max_file_read_size: 50000

# Git analysis
recent_commit_count: 30
top_changed_files_count: 10

# Output
output_file: "ONBOARDING.md"
